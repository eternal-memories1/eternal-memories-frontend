<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7280;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fondo -->
  <rect width="100" height="100" fill="#000000" rx="20"/>
  
  <!-- Paloma -->
  <g transform="translate(50, 45)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="url(#grad)"/>
    
    <!-- Cabeza -->
    <circle cx="0" cy="-20" r="12" fill="url(#grad)"/>
    
    <!-- Pico -->
    <path d="M 8 -18 L 18 -16" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Ojo -->
    <circle cx="4" cy="-22" r="2" fill="#ffffff"/>
    
    <!-- Alas -->
    <path d="M -12 -5 Q -28 -8 -32 8" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 12 -5 Q 28 -8 32 8" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Cola -->
    <path d="M -10 18 L -12 28" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 0 20 L 0 30" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 10 18 L 12 28" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>