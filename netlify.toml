[build]
  # Use --prefix to install and build in frontend/ directory without conflicting with Netlify UI settings.
  # This ensures npm finds package-lock.json in frontend/package-lock.json.
  command = "npm ci --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"

[context.production.environment]
  NODE_ENV = "production"

# Nota: si quieres previsualizar con `netlify dev`, puedes usar:
# [dev]
#   command = "npm run dev --prefix frontend"
