[build]
  # Usamos un comando explícito que instala y construye desde la carpeta `frontend`.
  # Esto evita problemas con entornos donde `base` no cambia el PATH de npm.
  command = "npm ci --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"

[context.production.environment]
  NODE_ENV = "production"

# Nota: si quieres previsualizar con `netlify dev`, puedes usar:
# [dev]
#   command = "npm run dev --prefix frontend"
